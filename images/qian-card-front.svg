<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 340">
  <defs>
    <radialGradient id="cardBg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#4a2a6b"/>
      <stop offset="60%" stop-color="#2e1a4a"/>
      <stop offset="100%" stop-color="#170f2c"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e0"/>
      <stop offset="60%" stop-color="#f3cf7e"/>
      <stop offset="100%" stop-color="#c9a455"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a87aff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#a87aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9ad6" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#ff9ad6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- outer card -->
  <rect x="6" y="6" width="228" height="328" rx="20" fill="url(#cardBg)" stroke="#e8cf94" stroke-width="2"/>
  <rect x="16" y="16" width="208" height="308" rx="14" fill="none" stroke="#e8cf94" stroke-width="1" opacity=".5"/>
  <!-- nebula color washes -->
  <ellipse cx="75" cy="95" rx="70" ry="55" fill="url(#nebula1)"/>
  <ellipse cx="170" cy="230" rx="65" ry="60" fill="url(#nebula2)"/>
  <ellipse cx="150" cy="80" rx="50" ry="40" fill="url(#nebula2)" opacity=".7"/>
  <!-- arched inner frame -->
  <path d="M40 300 L40 110 Q40 40 120 40 Q200 40 200 110 L200 300 Z" fill="none" stroke="#e8cf94" stroke-width="1.5" opacity=".7"/>
  <!-- dense starfield -->
  <g fill="#f3e3bc">
    <circle cx="58" cy="58" r="1.3" opacity=".8"/><circle cx="95" cy="65" r="1.8" opacity=".9"/>
    <circle cx="150" cy="70" r="1.4" opacity=".7"/><circle cx="168" cy="55" r="1.6" opacity=".85"/>
    <circle cx="130" cy="58" r="1" opacity=".6"/><circle cx="78" cy="80" r="1" opacity=".55"/>
    <circle cx="50" cy="150" r="1.6" opacity=".8"/><circle cx="190" cy="140" r="1.4" opacity=".75"/>
    <circle cx="60" cy="120" r="1" opacity=".5"/><circle cx="180" cy="115" r="1.2" opacity=".6"/>
    <circle cx="65" cy="190" r="1.3" opacity=".65"/><circle cx="175" cy="200" r="1" opacity=".55"/>
    <circle cx="110" cy="280" r="1.6" opacity=".8"/><circle cx="145" cy="290" r="1.3" opacity=".7"/>
    <circle cx="85" cy="270" r="1" opacity=".5"/><circle cx="160" cy="265" r="1.1" opacity=".6"/>
    <circle cx="95" cy="230" r="1" opacity=".45"/><circle cx="155" cy="240" r="1.2" opacity=".55"/>
    <circle cx="45" cy="220" r="1.1" opacity=".5"/><circle cx="195" cy="230" r="1" opacity=".5"/>
    <circle cx="120" cy="95" r="1" opacity=".5"/><circle cx="100" cy="220" r="1" opacity=".45"/>
    <circle cx="140" cy="120" r="0.9" opacity=".4"/><circle cx="70" cy="250" r="0.9" opacity=".4"/>
  </g>
  <!-- sparkle stars (4-point) -->
  <g fill="#f3e3bc">
    <g transform="translate(70,90)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(168,100) scale(.7)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(60,210) scale(.6)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(178,190) scale(.8)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(120,255) scale(.55)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(48,100) scale(.5)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
  </g>
  <!-- ambient clouds -->
  <g fill="#3a2356" opacity=".8">
    <ellipse cx="55" cy="270" rx="22" ry="8"/>
    <ellipse cx="40" cy="265" rx="14" ry="6"/>
    <ellipse cx="185" cy="255" rx="20" ry="7"/>
  </g>
  <!-- orbit rings -->
  <circle cx="120" cy="170" r="60" fill="none" stroke="#e8cf94" stroke-width="0.8" opacity=".35"/>
  <circle cx="120" cy="170" r="78" fill="none" stroke="#e8cf94" stroke-width="0.6" opacity=".22"/>
  <!-- left crescent moon -->
  <g transform="translate(48,150)">
    <path d="M8 -20 A20 20 0 1 0 8 20 A14 16 0 1 1 8 -20Z" fill="#e8cf94" opacity=".9"/>
  </g>
  <!-- right crystal ball -->
  <g transform="translate(192,148)">
    <circle r="14" fill="#a87aff" opacity=".85"/>
    <ellipse cx="-4" cy="-5" rx="4" ry="2.4" fill="#fff" opacity=".6"/>
  </g>
  <!-- center medallion: crescent + yin-yang -->
  <circle cx="120" cy="178" r="46" fill="#1c1030" stroke="#e8cf94" stroke-width="2"/>
  <g transform="translate(120,178)">
    <path d="M0 -34 A34 34 0 1 0 0 34 A24 24 0 1 1 0 -34 Z" fill="url(#moonGlow)"/>
    <circle cx="0" cy="-12" r="9" fill="#1c1030"/>
    <circle cx="0" cy="12" r="9" fill="url(#moonGlow)"/>
    <circle cx="0" cy="-12" r="2.6" fill="url(#moonGlow)"/>
    <circle cx="0" cy="12" r="2.6" fill="#1c1030"/>
  </g>
  <!-- bottom small cloud -->
  <g fill="#3a2356" opacity=".7">
    <ellipse cx="120" cy="295" rx="26" ry="7"/>
  </g>
</svg>
