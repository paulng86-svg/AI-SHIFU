<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 340">
  <defs>
    <radialGradient id="cardBg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#5c3580"/>
      <stop offset="45%" stop-color="#3a2156"/>
      <stop offset="80%" stop-color="#221537"/>
      <stop offset="100%" stop-color="#130c22"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e0"/>
      <stop offset="60%" stop-color="#f3cf7e"/>
      <stop offset="100%" stop-color="#c9a455"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a87aff" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#a87aff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9ad6" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#ff9ad6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ec8ff" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#7ec8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetRing" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="100%" stop-color="#e8924a"/>
    </radialGradient>
  </defs>
  <!-- outer card -->
  <rect x="6" y="6" width="228" height="328" rx="20" fill="url(#cardBg)" stroke="#e8cf94" stroke-width="2"/>
  <rect x="16" y="16" width="208" height="308" rx="14" fill="none" stroke="#e8cf94" stroke-width="1" opacity=".5"/>
  <!-- rich nebula color washes (layered) -->
  <ellipse cx="70" cy="90" rx="80" ry="62" fill="url(#nebula1)"/>
  <ellipse cx="175" cy="235" rx="70" ry="65" fill="url(#nebula2)"/>
  <ellipse cx="160" cy="75" rx="55" ry="45" fill="url(#nebula2)" opacity=".8"/>
  <ellipse cx="55" cy="230" rx="55" ry="50" fill="url(#nebula3)"/>
  <ellipse cx="120" cy="160" rx="90" ry="70" fill="url(#nebula3)" opacity=".5"/>
  <!-- arched inner frame -->
  <path d="M40 300 L40 110 Q40 40 120 40 Q200 40 200 110 L200 300 Z" fill="none" stroke="#e8cf94" stroke-width="1.5" opacity=".75"/>
  <!-- corner flourishes -->
  <g stroke="#e8cf94" stroke-width="1.2" fill="none" opacity=".6">
    <path d="M22 30 Q30 22 38 30 M22 30 Q30 38 38 30"/>
    <path d="M202 30 Q210 22 218 30 M202 30 Q210 38 218 30"/>
    <path d="M22 312 Q30 304 38 312 M22 312 Q30 320 38 312"/>
    <path d="M202 312 Q210 304 218 312 M202 312 Q210 320 218 312"/>
  </g>
  <!-- constellation lines -->
  <g stroke="#e8cf94" stroke-width="0.6" opacity=".4">
    <path d="M58 58 L95 65 L130 58 L168 55"/>
    <path d="M50 150 L60 120 L78 80"/>
    <path d="M180 115 L190 140 L178 190"/>
    <path d="M65 190 L95 230 L110 280"/>
    <path d="M145 290 L155 240 L160 200"/>
  </g>
  <!-- dense starfield -->
  <g fill="#f3e3bc">
    <circle cx="58" cy="58" r="1.4" opacity=".85"/><circle cx="95" cy="65" r="1.9" opacity=".95"/>
    <circle cx="150" cy="70" r="1.5" opacity=".75"/><circle cx="168" cy="55" r="1.7" opacity=".9"/>
    <circle cx="130" cy="58" r="1.1" opacity=".65"/><circle cx="78" cy="80" r="1.1" opacity=".6"/>
    <circle cx="50" cy="150" r="1.7" opacity=".85"/><circle cx="190" cy="140" r="1.5" opacity=".8"/>
    <circle cx="60" cy="120" r="1.1" opacity=".55"/><circle cx="180" cy="115" r="1.3" opacity=".65"/>
    <circle cx="65" cy="190" r="1.4" opacity=".7"/><circle cx="175" cy="200" r="1.1" opacity=".6"/>
    <circle cx="110" cy="280" r="1.7" opacity=".85"/><circle cx="145" cy="290" r="1.4" opacity=".75"/>
    <circle cx="85" cy="270" r="1.1" opacity=".55"/><circle cx="160" cy="265" r="1.2" opacity=".65"/>
    <circle cx="95" cy="230" r="1.1" opacity=".5"/><circle cx="155" cy="240" r="1.3" opacity=".6"/>
    <circle cx="45" cy="220" r="1.2" opacity=".55"/><circle cx="195" cy="230" r="1.1" opacity=".55"/>
    <circle cx="120" cy="95" r="1.1" opacity=".55"/><circle cx="100" cy="220" r="1.1" opacity=".5"/>
    <circle cx="140" cy="120" r="1" opacity=".45"/><circle cx="70" cy="250" r="1" opacity=".45"/>
    <circle cx="35" cy="100" r="1.2" opacity=".6"/><circle cx="205" cy="95" r="1.2" opacity=".6"/>
    <circle cx="30" cy="180" r="1" opacity=".5"/><circle cx="210" cy="175" r="1" opacity=".5"/>
    <circle cx="40" cy="260" r="1.1" opacity=".5"/><circle cx="200" cy="270" r="1.1" opacity=".5"/>
    <circle cx="125" cy="45" r="1" opacity=".5"/><circle cx="118" cy="305" r="1" opacity=".5"/>
  </g>
  <!-- sparkle stars (4-point), varied sizes -->
  <g fill="#f3e3bc">
    <g transform="translate(70,90)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(168,100) scale(.8)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(60,210) scale(.7)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(178,190) scale(.9)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(120,255) scale(.6)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(48,100) scale(.55)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(200,200) scale(.65)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
    <g transform="translate(85,255) scale(.5)"><path d="M0,-7 2,-2 7,0 2,2 0,7 -2,2 -7,0 -2,-2Z"/></g>
  </g>
  <!-- small ringed planet -->
  <g transform="translate(208,225) rotate(-20)">
    <ellipse rx="15" ry="5" fill="none" stroke="#f3cf7e" stroke-width="1.4" opacity=".8"/>
    <circle r="8" fill="url(#planetRing)"/>
  </g>
  <!-- ambient clouds -->
  <g fill="#3a2356" opacity=".85">
    <ellipse cx="55" cy="270" rx="24" ry="9"/>
    <ellipse cx="38" cy="264" rx="15" ry="6"/>
    <ellipse cx="185" cy="253" rx="22" ry="8"/>
  </g>
  <!-- orbit rings -->
  <circle cx="120" cy="170" r="60" fill="none" stroke="#e8cf94" stroke-width="0.9" opacity=".4"/>
  <circle cx="120" cy="170" r="78" fill="none" stroke="#e8cf94" stroke-width="0.7" opacity=".26"/>
  <circle cx="120" cy="170" r="92" fill="none" stroke="#e8cf94" stroke-width="0.5" opacity=".16"/>
  <!-- left crescent moon -->
  <g transform="translate(48,150)">
    <path d="M8 -20 A20 20 0 1 0 8 20 A14 16 0 1 1 8 -20Z" fill="#e8cf94" opacity=".95"/>
  </g>
  <!-- right crystal ball -->
  <g transform="translate(192,148)">
    <circle r="14" fill="#a87aff" opacity=".9"/>
    <ellipse cx="-4" cy="-5" rx="4" ry="2.4" fill="#fff" opacity=".65"/>
  </g>
  <!-- center medallion: crescent + yin-yang with glow halo -->
  <circle cx="120" cy="178" r="56" fill="url(#nebula1)" opacity=".7"/>
  <circle cx="120" cy="178" r="46" fill="#1c1030" stroke="#e8cf94" stroke-width="2"/>
  <g transform="translate(120,178)">
    <path d="M0 -34 A34 34 0 1 0 0 34 A24 24 0 1 1 0 -34 Z" fill="url(#moonGlow)"/>
    <circle cx="0" cy="-12" r="9" fill="#1c1030"/>
    <circle cx="0" cy="12" r="9" fill="url(#moonGlow)"/>
    <circle cx="0" cy="-12" r="2.6" fill="url(#moonGlow)"/>
    <circle cx="0" cy="12" r="2.6" fill="#1c1030"/>
  </g>
  <!-- bottom small cloud -->
  <g fill="#3a2356" opacity=".75">
    <ellipse cx="120" cy="295" rx="28" ry="8"/>
  </g>
</svg>
