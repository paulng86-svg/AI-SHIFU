<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260">
  <defs>
    <linearGradient id="tubeBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a2444"/>
      <stop offset="15%" stop-color="#263158"/>
      <stop offset="50%" stop-color="#1a2444"/>
      <stop offset="85%" stop-color="#0e1530"/>
      <stop offset="100%" stop-color="#0a0f1f"/>
    </linearGradient>
    <linearGradient id="goldRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e3bc"/>
      <stop offset="100%" stop-color="#c9a455"/>
    </linearGradient>
    <linearGradient id="stickGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d4a0"/>
      <stop offset="100%" stop-color="#b8924f"/>
    </linearGradient>
    <radialGradient id="tubeGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a87aff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#a87aff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- ambient glow -->
  <ellipse cx="100" cy="120" rx="95" ry="100" fill="url(#tubeGlow)"/>
  <!-- ground shadow -->
  <ellipse cx="100" cy="244" rx="48" ry="9" fill="#0a0f1f" opacity=".6"/>

  <!-- fortune sticks: thin flat bamboo slats, fanned slightly, with red ID band near top -->
  <g>
    <g transform="rotate(-13 100 138)">
      <rect x="97.5" y="34" width="3" height="104" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="40" width="4" height="6" fill="#9b2020"/>
    </g>
    <g transform="rotate(-8 100 138)">
      <rect x="97.5" y="28" width="3" height="110" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="35" width="4" height="6" fill="#9b2020"/>
    </g>
    <g transform="rotate(-3 100 138)">
      <rect x="97.5" y="24" width="3" height="114" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="31" width="4" height="6" fill="#9b2020"/>
    </g>
    <g transform="rotate(2 100 138)">
      <rect x="97.5" y="22" width="3" height="116" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="29" width="4" height="6" fill="#9b2020"/>
    </g>
    <g transform="rotate(7 100 138)">
      <rect x="97.5" y="26" width="3" height="112" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="33" width="4" height="6" fill="#9b2020"/>
    </g>
    <g transform="rotate(12 100 138)">
      <rect x="97.5" y="32" width="3" height="106" rx="1" fill="url(#stickGrad)" stroke="#7a5a28" stroke-width="0.4"/>
      <rect x="97" y="39" width="4" height="6" fill="#9b2020"/>
    </g>
  </g>

  <!-- tube body (cylinder) -->
  <path d="M44 100 L44 210 Q44 222 56 222 L144 222 Q156 222 156 210 L156 100 Z" fill="url(#tubeBody)" stroke="#e8cf94" stroke-width="2"/>
  <!-- bamboo joint rings -->
  <g stroke="#e8cf94" stroke-width="1" opacity=".35">
    <line x1="44" y1="140" x2="156" y2="140"/>
    <line x1="44" y1="180" x2="156" y2="180"/>
  </g>
  <!-- vertical bamboo grain lines -->
  <g stroke="#0a0f1f" stroke-width="1" opacity=".4">
    <line x1="64" y1="102" x2="64" y2="220"/>
    <line x1="86" y1="102" x2="86" y2="220"/>
    <line x1="114" y1="102" x2="114" y2="220"/>
    <line x1="136" y1="102" x2="136" y2="220"/>
  </g>
  <!-- gold rim (top opening) -->
  <ellipse cx="100" cy="100" rx="56" ry="14" fill="url(#goldRim)" stroke="#8a6a35" stroke-width="1.5"/>
  <ellipse cx="100" cy="98" rx="48" ry="10" fill="#0a0f1f"/>
  <!-- gold base ring -->
  <path d="M44 210 Q44 222 56 222 L144 222 Q156 222 156 210" fill="none" stroke="#c9a455" stroke-width="2.5" opacity=".7"/>
  <ellipse cx="100" cy="222" rx="56" ry="10" fill="#c9a455" opacity=".25"/>

  <!-- hanging tassel charm -->
  <g transform="translate(150,108)">
    <path d="M0 0 L4 10" stroke="#c9a455" stroke-width="1.5"/>
    <circle cx="4" cy="14" r="6" fill="#9b2020" stroke="#e8cf94" stroke-width="1"/>
    <path d="M0 19 L8 19 M1 23 L7 23 M2 27 L6 27" stroke="#e8cf94" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- small sparkles -->
  <g fill="#f3e3bc" opacity=".8">
    <g transform="translate(30,70) scale(.5)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
    <g transform="translate(172,80) scale(.45)"><path d="M0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8Z"/></g>
  </g>
</svg>
