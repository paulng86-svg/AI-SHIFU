<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200">
  <defs>
    <radialGradient id="orbGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#e8d9ff"/>
      <stop offset="55%" stop-color="#a87aff"/>
      <stop offset="100%" stop-color="#6b3fb0"/>
    </radialGradient>
    <linearGradient id="catBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b85c9"/>
      <stop offset="100%" stop-color="#6b5499"/>
    </linearGradient>
  </defs>
  <!-- ambient stars -->
  <g fill="#e8d9ff" opacity=".8">
    <circle cx="20" cy="30" r="2"/>
    <circle cx="195" cy="25" r="1.6"/>
    <circle cx="205" cy="70" r="1.4"/>
    <circle cx="15" cy="90" r="1.6"/>
    <path d="M170 15 l3 0 l1 3 l1 -3 l3 0 l-2.4 2 l1 3 l-2.6 -1.8 l-2.6 1.8 l1 -3 z" opacity=".7"/>
  </g>
  <!-- tail -->
  <path d="M158 165 Q190 160 185 125 Q182 105 165 112" stroke="#6b5499" stroke-width="11" fill="none" stroke-linecap="round"/>
  <!-- body -->
  <ellipse cx="120" cy="158" rx="46" ry="34" fill="url(#catBody)"/>
  <!-- crystal ball stand -->
  <ellipse cx="62" cy="183" rx="26" ry="6" fill="#4a2a6b"/>
  <rect x="50" y="175" width="24" height="8" rx="3" fill="#3a2056"/>
  <!-- crystal ball -->
  <circle cx="62" cy="155" r="26" fill="url(#orbGlow)" opacity=".95"/>
  <circle cx="62" cy="155" r="26" fill="none" stroke="#e8d9ff" stroke-width="1.5" opacity=".6"/>
  <ellipse cx="53" cy="146" rx="7" ry="4" fill="#fff" opacity=".55"/>
  <path d="M40 175 q3 -3 6 0" stroke="#3a2056" stroke-width="1.5" fill="none" opacity=".5"/>
  <!-- paws on ball -->
  <ellipse cx="78" cy="158" rx="9" ry="7" fill="#9b85c9" transform="rotate(-15 78 158)"/>
  <!-- head -->
  <circle cx="118" cy="100" r="34" fill="url(#catBody)"/>
  <!-- ears -->
  <path d="M92 78 L84 55 L106 70 Z" fill="#6b5499"/>
  <path d="M146 78 L154 55 L132 70 Z" fill="#6b5499"/>
  <path d="M93 75 L88 60 L102 70 Z" fill="#caa8f0"/>
  <path d="M145 75 L150 60 L136 70 Z" fill="#caa8f0"/>
  <!-- wizard hat -->
  <g>
    <path d="M118 36 L150 88 Q118 78 86 88 Z" fill="#3a2056"/>
    <ellipse cx="118" cy="88" rx="34" ry="8" fill="#4a2a6b"/>
    <path d="M118 36 q6 8 -2 16" stroke="#3a2056" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M112 50 l3 -3 l1 4 l1.5 -4 l3 3 l-3 1 l1 4 l-3.2 -2.4 l-3.2 2.4 l1 -4 z" fill="#f3cf7e"/>
    <circle cx="118" cy="36" r="3" fill="#f3cf7e"/>
  </g>
  <!-- face -->
  <circle cx="107" cy="103" r="3.6" fill="#241638"/>
  <circle cx="129" cy="103" r="3.6" fill="#241638"/>
  <circle cx="108.5" cy="101.5" r="1" fill="#fff"/>
  <circle cx="130.5" cy="101.5" r="1" fill="#fff"/>
  <path d="M112 113 Q118 117 124 113" stroke="#241638" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="109" rx="4" ry="2.5" fill="#caa8f0" opacity=".7"/>
  <ellipse cx="136" cy="109" rx="4" ry="2.5" fill="#caa8f0" opacity=".7"/>
  <!-- whiskers -->
  <path d="M95 107 L78 104 M95 111 L78 113 M141 107 L158 104 M141 111 L158 113" stroke="#4a3370" stroke-width="1" opacity=".6"/>
</svg>
